name: 📅 Eventos ChocoPop Flow

on:
  # Corre cada hora para mantener status live/soon actualizado
  schedule:
    - cron: '0 * * * *'

  # Permite ejecutarlo manualmente desde GitHub → Actions
  workflow_dispatch:

jobs:
  scrape-chocopopflow-events:
    name: Scraping Eventos ChocoPop → Firestore (chocopopEvents)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: 📦 Instalar dependencias del scraper
        working-directory: scripts
        run: npm install

      - name: 🚀 Ejecutar scraper de eventos ChocoPop Flow
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scrape-chocopopflow-events.js

      - name: ✅ Resultado
        if: success()
        run: echo "Eventos ChocoPop Flow actualizados correctamente para $(date +'%d/%m/%Y %H:%M UTC')"

      - name: ❌ Error
        if: failure()
        run: echo "El scraper de eventos ChocoPop Flow falló. Verificá los logs de arriba."
