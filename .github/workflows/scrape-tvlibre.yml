name: 📺 Actualizar Canales TV Libre

on:
  # Corre cada 3 horas (los links cambian frecuentemente)
  schedule:
    - cron: '0 */3 * * *'

  # Permite ejecutarlo manualmente desde GitHub → Actions
  workflow_dispatch:

jobs:
  scrape-tvlibre:
    name: Scraping tv-libre.net → Firestore
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: 📦 Instalar dependencias del scraper
        working-directory: scripts
        run: npm install

      - name: 🚀 Ejecutar scraper de TV Libre
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scrape-tvlibre.js

      - name: ✅ Resultado
        if: success()
        run: echo "TV Libre actualizado correctamente para $(date +'%d/%m/%Y %H:%M UTC')"

      - name: ❌ Error
        if: failure()
        run: echo "El scraper de TV Libre falló. Verificá los logs de arriba."
