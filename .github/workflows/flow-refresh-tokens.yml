name: 🔄 Flow Token Auto-Refresh

on:
  schedule:
    # Corre cada 20 horas (los tokens duran ~24h, así siempre hay margen)
    - cron: '0 */20 * * *'
  workflow_dispatch:
    # También se puede correr manualmente desde la UI de GitHub

jobs:
  refresh:
    name: Renovar tokens de Flow Argentina
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm ci
        working-directory: .

      - name: 🔑 Refresh Flow tokens + update Firestore
        env:
          # Token de Flow que dura meses — guardar en GitHub Secrets como FLOW_ACCESS_TOKEN
          # Cómo obtenerlo: portal.app.flow.com.ar > DevTools > Console:
          #   localStorage.getItem('flowAccessToken')
          FLOW_ACCESS_TOKEN: ${{ secrets.FLOW_ACCESS_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/flow-refresh-tokens.js

      - name: 🚀 Run full channel scraper with fresh tokens
        env:
          FLOW_ACCESS_TOKEN: ${{ secrets.FLOW_ACCESS_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/scrape-flow.js
        continue-on-error: true   # Si falla el scraper, el refresh de tokens ya quedó guardado

      - name: ✅ Done
        run: echo "Flow tokens refreshed and channels updated at $(date)"
